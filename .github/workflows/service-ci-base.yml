name: Reusable Service CI

on:
  workflow_call:
    inputs:
      service_name:
        required: true
        type: string
      service_path:
        required: true
        type: string
      language:
        required: true
        type: string
      python_version:
        required: false
        type: string
        default: "3.12"
      go_version:
        required: false
        type: string
        default: "1.22"
      image_name:
        required: true
        type: string
      trivy_fail_on_critical:
        required: false
        type: boolean
        default: true
    secrets:
      AWS_REGION:
        required: false
      AWS_ACCOUNT_ID:
        required: false
      AWS_ACCESS_KEY_ID:
        required: false
      AWS_SECRET_ACCESS_KEY:
        required: false
      AWS_SESSION_TOKEN:
        required: false

jobs:
  build_test:
    name: Build and Test - ${{ inputs.service_name }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.service_path }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        if: inputs.language == 'go'
        uses: actions/setup-go@v5
        with:
          go-version: ${{ inputs.go_version }}
          cache-dependency-path: ${{ inputs.service_path }}/go.sum

      - name: Setup Python
        if: inputs.language == 'python'
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python_version }}

      - name: Build/Test Go
        if: inputs.language == 'go'
        run: |
          go mod download
          go test ./... -v

      - name: Build/Test Python
        if: inputs.language == 'python'
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          if [ -f "pytest.ini" ] || [ -d "tests" ]; then
            pip install pytest
            pytest -q
          else
            echo "No tests found. Skipping pytest."
          fi

  lint_and_security:
    name: Lint and Security - ${{ inputs.service_name }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.service_path }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        if: inputs.language == 'go'
        uses: actions/setup-go@v5
        with:
          go-version: ${{ inputs.go_version }}
          cache-dependency-path: ${{ inputs.service_path }}/go.sum

      - name: Setup Python
        if: inputs.language == 'python'
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python_version }}

      - name: GolangCI-Lint
        if: inputs.language == 'go'
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.59
          working-directory: ${{ inputs.service_path }}

      - name: Flake8
        if: inputs.language == 'python'
        run: |
          python -m pip install --upgrade pip
          pip install flake8 -r requirements.txt
          flake8 .

      - name: Gosec (SAST)
        if: inputs.language == 'go'
        run: |
          go install github.com/securego/gosec/v2/cmd/gosec@latest
          export PATH="$PATH:$(go env GOPATH)/bin"
          gosec ./...

      - name: Bandit (SAST)
        if: inputs.language == 'python'
        run: |
          pip install bandit
          bandit -r . -ll

      - name: Trivy FS (SCA)
        uses: aquasecurity/trivy-action@0.24.0
        with:
          scan-type: fs
          scan-ref: ${{ inputs.service_path }}
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: ${{ inputs.trivy_fail_on_critical && '1' || '0' }}
          vuln-type: library
          format: table

  container:
    name: Container Build - ${{ inputs.service_name }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.service_path }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image tag
        id: image_meta
        run: echo "tag=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Build Docker image
        run: |
          docker build -t ${{ inputs.image_name }}:${{ steps.image_meta.outputs.tag }} .

      - name: Trivy Image Scan
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: ${{ inputs.image_name }}:${{ steps.image_meta.outputs.tag }}
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: ${{ inputs.trivy_fail_on_critical && '1' || '0' }}
          format: table

      - name: Configure AWS credentials
        if: ${{ secrets.AWS_ACCESS_KEY_ID != '' && secrets.AWS_SECRET_ACCESS_KEY != '' && secrets.AWS_REGION != '' && secrets.AWS_ACCOUNT_ID != '' }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to ECR
        if: ${{ secrets.AWS_ACCESS_KEY_ID != '' && secrets.AWS_SECRET_ACCESS_KEY != '' && secrets.AWS_REGION != '' && secrets.AWS_ACCOUNT_ID != '' }}
        uses: aws-actions/amazon-ecr-login@v2

      - name: Push to ECR
        if: ${{ secrets.AWS_ACCESS_KEY_ID != '' && secrets.AWS_SECRET_ACCESS_KEY != '' && secrets.AWS_REGION != '' && secrets.AWS_ACCOUNT_ID != '' }}
        run: |
          ECR_URI=${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/${{ inputs.image_name }}
          docker tag ${{ inputs.image_name }}:${{ steps.image_meta.outputs.tag }} $ECR_URI:${{ steps.image_meta.outputs.tag }}
          docker push $ECR_URI:${{ steps.image_meta.outputs.tag }}

      - name: ECR push skipped message
        if: ${{ !(secrets.AWS_ACCESS_KEY_ID != '' && secrets.AWS_SECRET_ACCESS_KEY != '' && secrets.AWS_REGION != '' && secrets.AWS_ACCOUNT_ID != '') }}
        run: echo "AWS secrets not configured yet. Image push skipped."
