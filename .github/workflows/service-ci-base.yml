name: Reusable Service CI

on:
  workflow_call:
    inputs:
      service_name:
        required: true
        type: string
      service_path:
        required: true
        type: string
      language:
        required: true
        type: string
      python_version:
        required: false
        type: string
        default: "3.12"
      go_version:
        required: false
        type: string
        default: "1.22"
      image_name:
        required: true
        type: string
      trivy_fail_on_critical:
        required: false
        type: boolean
        default: true
      sonar_enabled:
        required: false
        type: boolean
        default: false
      sonar_project_key:
        required: false
        type: string
        default: ""
      sonar_organization:
        required: false
        type: string
        default: ""
    secrets:
      AWS_REGION:
        required: false
      AWS_ACCOUNT_ID:
        required: false
      AWS_ACCESS_KEY_ID:
        required: false
      AWS_SECRET_ACCESS_KEY:
        required: false
      AWS_SESSION_TOKEN:
        required: false
      SONAR_TOKEN:
        required: false

jobs:
  build_test:
    name: Build and Test - ${{ inputs.service_name }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.service_path }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        if: inputs.language == 'go'
        uses: actions/setup-go@v5
        with:
          go-version: ${{ inputs.go_version }}
          cache-dependency-path: ${{ inputs.service_path }}/go.sum

      - name: Setup Python
        if: inputs.language == 'python'
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python_version }}

      - name: Build/Test Go
        if: inputs.language == 'go'
        run: |
          go mod download
          go test ./... -v

      - name: Build/Test Python
        if: inputs.language == 'python'
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          if [ -f "pytest.ini" ] || [ -d "tests" ]; then
            pip install pytest
            pytest -q
          else
            echo "No tests found. Skipping pytest."
          fi

  lint:
    name: Lint - ${{ inputs.service_name }}
    runs-on: ubuntu-latest
    needs: [build_test]
    defaults:
      run:
        working-directory: ${{ inputs.service_path }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        if: inputs.language == 'go'
        uses: actions/setup-go@v5
        with:
          go-version: ${{ inputs.go_version }}
          cache-dependency-path: ${{ inputs.service_path }}/go.sum

      - name: Setup Python
        if: inputs.language == 'python'
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python_version }}

      - name: GolangCI-Lint
        if: inputs.language == 'go'
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.59
          working-directory: ${{ inputs.service_path }}

      - name: Flake8
        if: inputs.language == 'python'
        run: |
          python -m pip install --upgrade pip
          pip install flake8 -r requirements.txt
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

  sast:
    name: SAST - ${{ inputs.service_name }}
    runs-on: ubuntu-latest
    needs: [build_test]
    defaults:
      run:
        working-directory: ${{ inputs.service_path }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        if: inputs.language == 'go'
        uses: actions/setup-go@v5
        with:
          go-version: ${{ inputs.go_version }}
          cache-dependency-path: ${{ inputs.service_path }}/go.sum

      - name: Setup Python
        if: inputs.language == 'python'
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python_version }}

      - name: Gosec (SAST)
        if: inputs.language == 'go'
        run: |
          go install github.com/securego/gosec/v2/cmd/gosec@latest
          export PATH="$PATH:$(go env GOPATH)/bin"
          gosec -severity high -confidence medium ./...

      - name: Bandit (SAST)
        if: inputs.language == 'python'
        run: |
          pip install bandit
          bandit -r . -lll

  sca_fs:
    name: SCA (Filesystem) - ${{ inputs.service_name }}
    runs-on: ubuntu-latest
    needs: [build_test]
    defaults:
      run:
        working-directory: ${{ inputs.service_path }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Trivy FS (SCA)
        uses: aquasecurity/trivy-action@v0.24.0
        with:
          scan-type: fs
          scan-ref: ${{ inputs.service_path }}
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: ${{ inputs.trivy_fail_on_critical && '1' || '0' }}
          vuln-type: library
          format: table

  sonar:
    name: SonarCloud - ${{ inputs.service_name }}
    runs-on: ubuntu-latest
    needs: [build_test, lint]
    if: ${{ inputs.sonar_enabled && inputs.sonar_project_key != '' && inputs.sonar_organization != '' }}
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
    defaults:
      run:
        working-directory: ${{ inputs.service_path }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: SonarCloud Scan
        if: ${{ env.SONAR_TOKEN != '' }}
        uses: SonarSource/sonarqube-scan-action@v5
        env:
          SONAR_TOKEN: ${{ env.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io
        with:
          projectBaseDir: ${{ inputs.service_path }}
          args: >
            -Dsonar.projectKey=${{ inputs.sonar_project_key }}
            -Dsonar.organization=${{ inputs.sonar_organization }}

      - name: Sonar skipped message
        if: ${{ env.SONAR_TOKEN == '' }}
        run: echo "SONAR_TOKEN not configured. SonarCloud step skipped."

  container_build:
    name: Container Build - ${{ inputs.service_name }}
    runs-on: ubuntu-latest
    needs: [build_test, lint, sast, sca_fs]
    outputs:
      image_tag: ${{ steps.image_meta.outputs.tag }}
      artifact_name: ${{ steps.image_meta.outputs.artifact_name }}
    defaults:
      run:
        working-directory: ${{ inputs.service_path }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image tag
        id: image_meta
        run: |
          echo "tag=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          echo "artifact_name=${{ inputs.image_name }}-image-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Build Docker image
        run: docker build -t ${{ inputs.image_name }}:${{ steps.image_meta.outputs.tag }} .

      - name: Save Docker image as artifact
        run: docker save ${{ inputs.image_name }}:${{ steps.image_meta.outputs.tag }} -o image.tar

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.image_meta.outputs.artifact_name }}
          path: ${{ inputs.service_path }}/image.tar
          if-no-files-found: error
          retention-days: 1

  container_scan:
    name: Container Scan - ${{ inputs.service_name }}
    runs-on: ubuntu-latest
    needs: [container_build]
    steps:
      - name: Download image artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.container_build.outputs.artifact_name }}
          path: .

      - name: Load Docker image
        run: docker load -i image.tar

      - name: Trivy Image Scan
        uses: aquasecurity/trivy-action@v0.24.0
        with:
          image-ref: ${{ inputs.image_name }}:${{ needs.container_build.outputs.image_tag }}
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: ${{ inputs.trivy_fail_on_critical && '1' || '0' }}
          format: table

  push_ecr:
    name: Push ECR - ${{ inputs.service_name }}
    runs-on: ubuntu-latest
    needs: [container_scan]
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_REGION: ${{ secrets.AWS_REGION }}
      AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
      AWS_SESSION_TOKEN: ${{ secrets.AWS_SESSION_TOKEN }}
    defaults:
      run:
        working-directory: ${{ inputs.service_path }}
    steps:
      - name: Download image artifact
        if: ${{ env.AWS_ACCESS_KEY_ID != '' && env.AWS_SECRET_ACCESS_KEY != '' && env.AWS_REGION != '' && env.AWS_ACCOUNT_ID != '' }}
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.container_build.outputs.artifact_name }}
          path: .

      - name: Load Docker image
        if: ${{ env.AWS_ACCESS_KEY_ID != '' && env.AWS_SECRET_ACCESS_KEY != '' && env.AWS_REGION != '' && env.AWS_ACCOUNT_ID != '' }}
        run: docker load -i image.tar

      - name: Configure AWS credentials
        if: ${{ env.AWS_ACCESS_KEY_ID != '' && env.AWS_SECRET_ACCESS_KEY != '' && env.AWS_REGION != '' && env.AWS_ACCOUNT_ID != '' }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ env.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ env.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ env.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        if: ${{ env.AWS_ACCESS_KEY_ID != '' && env.AWS_SECRET_ACCESS_KEY != '' && env.AWS_REGION != '' && env.AWS_ACCOUNT_ID != '' }}
        uses: aws-actions/amazon-ecr-login@v2

      - name: Push to ECR
        if: ${{ env.AWS_ACCESS_KEY_ID != '' && env.AWS_SECRET_ACCESS_KEY != '' && env.AWS_REGION != '' && env.AWS_ACCOUNT_ID != '' }}
        run: |
          ECR_URI=${{ env.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ inputs.image_name }}
          docker tag ${{ inputs.image_name }}:${{ needs.container_build.outputs.image_tag }} $ECR_URI:${{ needs.container_build.outputs.image_tag }}
          docker push $ECR_URI:${{ needs.container_build.outputs.image_tag }}

      - name: ECR push skipped message
        if: ${{ !(env.AWS_ACCESS_KEY_ID != '' && env.AWS_SECRET_ACCESS_KEY != '' && env.AWS_REGION != '' && env.AWS_ACCOUNT_ID != '') }}
        run: echo "AWS secrets not configured yet. Image push skipped."
