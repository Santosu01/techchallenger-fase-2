name: Analytics Service CI

on:
  workflow_dispatch:
  pull_request:
    branches: [main, Tech-Fase3]
    paths:
      - "backend-services/analytics-service/**"
      - ".github/workflows/analytics-service-ci.yml"
      - ".github/workflows/service-ci-base.yml"
  push:
    branches: [main, Tech-Fase3]
    paths:
      - "backend-services/analytics-service/**"
      - ".github/workflows/analytics-service-ci.yml"
      - ".github/workflows/service-ci-base.yml"

jobs:
  analytics_service_ci:
    uses: ./.github/workflows/service-ci-base.yml
    with:
      service_name: analytics-service
      service_path: backend-services/analytics-service
      language: python
      image_name: analytics-service
      trivy_fail_on_critical: true
    secrets: inherit
