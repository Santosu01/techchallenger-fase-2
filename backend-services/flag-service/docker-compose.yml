name: togglemaster
# flag-service docker-compose.yml

networks:
  flag-db-net:
  service-backbone:

services:
  flag-postgres:
    image: postgres:15-alpine
    networks:
      - flag-db-net
    env_file:
      - .env
    # No host port mapping to avoid conflicts when included.
    expose:
      - "5432"
    volumes:
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
      - flag_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U $${POSTGRES_USER:-user} -d $${POSTGRES_DB:-flag_db}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  flag-app:
    build: .
    networks:
      - flag-db-net
      - service-backbone
    depends_on:
      flag-postgres:
        condition: service_healthy
      auth-app:
        condition: service_healthy
    env_file:
      - .env
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget --no-verbose --tries=1 --spider http://localhost:8002/health || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  flag_postgres_data:
