# ==========================================
# SECRETS DA APLICACAO
# ==========================================
apiVersion: v1
kind: Secret
metadata:
  name: app-secrets
  namespace: togglemaster
type: Opaque
data:
  # Valores em base64
  # Para gerar: echo -n "valor" | base64
  POSTGRES_USER: cG9zdGdyZXM= # "postgres" - substituir pelo valor real
  POSTGRES_PASSWORD: dG9nZ2xlbWFzdGVyITEyMzQ= # "togglemaster!1234" - substituir pelo valor real
  MASTER_KEY: YWRtaW4tc2VjcmV0by0xMjM= # "admin-secreto-123" - substituir pelo valor real

---
# ==========================================
# CREDENCIAIS AWS (atualizar via script)
# ==========================================
# IMPORTANTE: Este secret contem placeholders vazios.
# Use o script update-aws-credentials.bat/.sh para atualizar com suas credenciais reais.
#
# As credenciais do AWS Academy expiram quando a sessao do lab termina.
# Execute o script de atualizacao sempre que reiniciar o lab.
#
apiVersion: v1
kind: Secret
metadata:
  name: aws-credentials
  namespace: togglemaster
type: Opaque
# Valores vazios em base64 - serao atualizados pelo script
# Os pods iniciam mesmo sem credenciais AWS validas (servicos degradados)
data:
  # Placeholder vazio: echo -n "" | base64 = ""
  AWS_ACCESS_KEY_ID: ""
  AWS_SECRET_ACCESS_KEY: ""
  AWS_SESSION_TOKEN: ""
