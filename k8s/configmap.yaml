apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: togglemaster
data:
  # --- BANCOS DE DADOS (RDS) ---
  AUTH_DB_HOST: "togglemaster-auth.c3egoweeu7yf.us-east-1.rds.amazonaws.com"
  FLAG_DB_HOST: "togglemaster-flags.c3egoweeu7yf.us-east-1.rds.amazonaws.com"
  TARGETING_DB_HOST: "togglemaster-targeting.c3egoweeu7yf.us-east-1.rds.amazonaws.com"

  # --- CACHE (REDIS - ELASTICACHE CLUSTER MODE) ---
  REDIS_HOST: "clustercfg.togglemaster-cache.gulbnn.use1.cache.amazonaws.com:6379"
  REDIS_TLS: "true"

  # --- URLS DE SERVIÇOS INTERNOS ---
  AUTH_SERVICE_URL: "http://auth-service:8001"
  FLAG_SERVICE_URL: "http://flag-service:8002"
  TARGETING_SERVICE_URL: "http://targeting-service:8003"
  EVALUATION_SERVICE_URL: "http://evaluation-service:8004"
  ANALYTICS_SERVICE_URL: "http://analytics-service:8006"

  # --- CONFIGURAÇÕES AWS ---
  AWS_REGION: "us-east-1"
  AWS_SQS_URL: "https://sqs.us-east-1.amazonaws.com/891377095805/togglemaster-analytics-queue"
  AWS_DYNAMODB_TABLE: "ToggleMasterAnalytics"
  AWS_ACCOUNT_ID: "891377095805"
